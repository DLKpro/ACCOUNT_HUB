name: Rust CI

# Phase 0 exit criterion: this workflow is green on all three OSes.
# See docs/quality-gates.md §5.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "osv-scanner.toml"
      - ".cargo/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "osv-scanner.toml"
      - ".cargo/**"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Tri-platform check per the migration plan: macOS + Windows + Linux from day one.
  check:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (per rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy

      # Tauri 2 on Linux links against webkit2gtk-4.1 and the GTK3 stack.
      # These aren't preinstalled on ubuntu-latest runners. macOS + Windows
      # bundle their respective webviews (WebKit / WebView2) in the OS.
      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (all targets, deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test (all workspace)
        run: cargo test --workspace --all-features

      - name: cargo doc (no deps, deny warnings)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: cargo-audit (advisory DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # `cargo audit` reads .cargo/audit.toml for the ignore list. Each entry
      # there has a RUSTSEC ID and a rationale comment; see that file for the
      # quarterly-review policy.
      - name: cargo audit
        run: cargo audit --deny warnings

  deny:
    name: cargo-deny (licenses + bans + dupes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          # Pinned to 0.18.x — 0.19+ requires rustc 1.88.0+, newer than our pinned 1.85.0.
          # Advisory parsing is skipped below because 0.18 can't handle CVSS 4.0 entries;
          # the cargo-audit job is the source of truth for advisories.
          tool: cargo-deny@0.18.3

      - name: cargo deny check (licenses + bans + sources; advisories handled by cargo-audit)
        run: cargo deny --all-features check licenses bans sources

  osv-scan:
    name: osv-scanner (cross-ecosystem vuln feed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # osv-scanner reads osv-scanner.toml for IgnoredVulns; mirrors .cargo/audit.toml.
      - uses: google/osv-scanner-action/osv-scanner-action@v2.2.3
        with:
          scan-args: |-
            --config=./osv-scanner.toml
            --lockfile=./Cargo.lock
