# cargo-deny policy. Referenced by .github/workflows/rust.yml.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check every target we ship for (macOS + Windows + Linux, all x86_64 and aarch64).
targets = [
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
# Advisory scanning lives in the `cargo-audit` CI job. We do not run `cargo deny check
# advisories` at all — the workflow invokes `cargo deny check licenses bans sources`.
#
# Reason: cargo-deny 0.18.x (pinned until the toolchain can move to 1.88.0 for 0.19.1)
# chokes on CVSS 4.0 entries in the RustSec advisory DB, which has been shipping them
# since 2026. cargo-audit has no such problem. We get the security signal from one
# source rather than two, avoiding false-positive advisory-parse errors.
ignore = []

[licenses]
version = 2
# Allowlist. Anything outside fails the build — we have to consciously approve new licenses.
# The set below covers the common permissive + corporate-friendly licenses seen in the Rust
# ecosystem. BSL / AGPL / GPL are deliberately absent — flag them for human review.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "0BSD",
  "Zlib",
]
# Confidence threshold for license detection (0.0 to 1.0). Higher = stricter.
confidence-threshold = 0.92
exceptions = []

# Internal workspace crates use `license = "Proprietary"`, which is not a valid SPDX
# expression. Since all three carry `publish = false`, exempt them from the license check.
# This is the idiomatic mechanism — not a silenced warning, but an intentional scoping of
# cargo-deny's licence scrutiny to third-party dependencies where it actually matters.
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
# No dep in this workspace should exist that we don't want. Populate as concerns arise.
deny = []
# Skip known-duplicate trees that are fine (populate if a specific dup emerges).
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
