# cargo-deny policy. Referenced by .github/workflows/rust.yml.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check every target we ship for (macOS + Windows + Linux, all x86_64 and aarch64).
targets = [
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
# Advisory scanning lives in the `cargo-audit` CI job. We do not run `cargo deny check
# advisories` at all — the workflow invokes `cargo deny check licenses bans sources`.
#
# Reason: cargo-deny 0.18.x (pinned until the toolchain can move to 1.88.0 for 0.19.1)
# chokes on CVSS 4.0 entries in the RustSec advisory DB, which has been shipping them
# since 2026. cargo-audit has no such problem. We get the security signal from one
# source rather than two, avoiding false-positive advisory-parse errors.
ignore = []

[licenses]
version = 2
# Allowlist. Anything outside fails the build — we have to consciously approve new licenses.
# The set below covers the common permissive + corporate-friendly licenses seen in the Rust
# ecosystem. BSL / AGPL / GPL are deliberately absent — flag them for human review.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "0BSD",
  "Zlib",
]
# Confidence threshold for license detection (0.0 to 1.0). Higher = stricter.
confidence-threshold = 0.92

# Per-crate license exemptions.
#
# Policy (per docs/quality-gates.md §7 risk j): MPL-2.0 and other non-default licenses
# are NEVER blanket-added to the `allow` list above. Each crate is listed individually
# with an inline justification so a future reviewer can see exactly what was approved
# and on what grounds. If a new version of one of these crates introduces a different
# license or the crate begins modifying its upstream, re-review is required.
#
# MPL-2.0 is "weak copyleft" (file-level): obligations apply only to modifications of
# the MPL-licensed files themselves and their redistribution. Using these crates as
# unmodified library dependencies — as we do in every case below — incurs only the
# standard attribution obligation, which Tauri's release-build attribution machinery
# handles. Re-review trigger: if we ever vendor, patch, or fork any of these.
exceptions = [
    # cssparser / cssparser-macros / dtoa-short / selectors: Servo's CSS parser family.
    # Pulled via kuchikiki (HTML rewriter used by tauri-utils for asset/link processing
    # during bundling). We never touch these sources directly.
    { allow = ["MPL-2.0"], name = "cssparser" },
    { allow = ["MPL-2.0"], name = "cssparser-macros" },
    { allow = ["MPL-2.0"], name = "dtoa-short" },
    { allow = ["MPL-2.0"], name = "selectors" },

    # option-ext: ~2-line helper crate by the `dirs` author. Pulled via dirs-sys for
    # platform-standard paths (config/data/cache dirs). Used unmodified.
    { allow = ["MPL-2.0"], name = "option-ext" },
]

# Internal workspace crates use `license = "Proprietary"`, which is not a valid SPDX
# expression. Since all three carry `publish = false`, exempt them from the license check.
# This is the idiomatic mechanism — not a silenced warning, but an intentional scoping of
# cargo-deny's licence scrutiny to third-party dependencies where it actually matters.
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
# No dep in this workspace should exist that we don't want. Populate as concerns arise.
deny = []
# Skip known-duplicate trees that are fine (populate if a specific dup emerges).
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
