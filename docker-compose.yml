services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accounthub
      POSTGRES_PASSWORD: accounthub
      POSTGRES_DB: accounthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://accounthub:accounthub@db:5432/accounthub
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
