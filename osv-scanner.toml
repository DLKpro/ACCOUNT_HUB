# osv-scanner configuration.
#
# Mirrors `.cargo/audit.toml` — same per-ID ignore list with rationale.
# The two scanners use different feeds but overlap heavily on the Rust
# ecosystem, so keeping them in lockstep is a source of truth for
# "advisories we have evaluated and accepted."
#
# Policy + review cadence identical to .cargo/audit.toml (quarterly).
# Last reviewed: 2026-04-14 (W1 wrap-up).

